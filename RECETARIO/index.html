<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<title>Recetario · Casa Amparo 1948</title>
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a1a1a'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='28' fill='%23d4a373'%3E1948%3C/text%3E%3C/svg%3E" />
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <h1 class="login-title">Casa Amparo 1948</h1>
    <p class="login-sub">Recetario de cocina</p>
    <input type="password" id="password" placeholder="Contraseña" autocomplete="off" />
    <button id="login-btn">Entrar</button>
    <p id="login-err" class="login-err"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="brand">
        <span class="brand-name">Casa Amparo</span>
        <span class="brand-year">1948</span>
      </h1>
      <button id="logout" class="logout" aria-label="Salir">⎋</button>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Buscar plato, ingrediente..." autocomplete="off" />
      <span id="count" class="count"></span>
    </div>
    <div id="filters" class="filters"></div>
  </header>

  <main id="grid" class="grid"></main>
  <p id="empty" class="empty hidden">Sin resultados.</p>

</div>

<!-- DETALLE -->
<div id="detail" class="detail hidden">
  <button id="back" class="back" aria-label="Volver">←</button>
  <div id="detail-content" class="detail-content"></div>
</div>

<!-- LIGHTBOX FOTO -->
<div id="lightbox" class="lightbox hidden">
  <img id="lightbox-img" alt="" />
</div>

<script src="app.js"></script>
</body>
</html>
